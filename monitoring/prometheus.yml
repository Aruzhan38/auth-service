global:
  scrape_interval: 15s
  evaluation_interval: 15s
 
# ─── Alertmanager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
 
# ─── Alert Rules ──────────────────────────────────────────────────────────────
rule_files:
  - "alerts.yml"
 
# ─── Scrape Configs ───────────────────────────────────────────────────────────
scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
 
  # Auth Service — main SLI metrics
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:3000"]
    metrics_path: /metrics
    scrape_interval: 10s
 
  # Node exporter (if deployed) — system metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]