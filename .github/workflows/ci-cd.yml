name: CI/CD — Auth Service
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/auth-service
 
jobs:
  # ─── Job 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
 
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: authdb_test
          POSTGRES_USER: authuser
          POSTGRES_PASSWORD: authpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
 
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
 
      - name: Install dependencies
        run: npm ci
        working-directory: ./app
 
      - name: Run tests
        run: npm test
        working-directory: ./app
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: authdb_test
          DB_USER: authuser
          DB_PASSWORD: authpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key
 
  # ─── Job 2: Build & Push Docker Image ───────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass
    if: github.ref == 'refs/heads/main'
 
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
 
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
  # ─── Job 3: Deploy to Kubernetes ────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
 
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
 
      - name: Update image tag in deployment
        run: |
          kubectl set image deployment/auth-service \
            auth-service=${{ env.DOCKER_IMAGE }}:sha-${{ github.sha }} \
            -n auth-service
 
      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/auth-service \
            -n auth-service \
            --timeout=120s
 
      - name: Verify deployment
        run: |
          kubectl get pods -n auth-service
          kubectl get hpa -n auth-service